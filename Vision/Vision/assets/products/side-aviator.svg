<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Vision side profile — Aviator frame (temple-arm view). Charcoal #2a2a2c, shared studio backdrop. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#f7f7f5"/>
      <stop offset="1" stop-color="#e3e3e0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-300%" width="200%" height="700%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9f0f5"/>
      <stop offset="1" stop-color="#c6d2db"/>
    </linearGradient>
    <clipPath id="lc">
      <path d="M162,158 Q162,142 180,142 L248,146 Q268,148 268,168 L262,248 Q254,326 208,334 Q170,328 162,254 Z"/>
    </clipPath>
  </defs>

  <!-- Studio sweep + ground shadow -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="396" rx="255" ry="19" fill="#17171c" opacity=".17" filter="url(#soft)"/>

  <!-- Wire temple with cable ear hook: depth pass, face pass, sheen -->
  <path d="M256,178 L584,176 Q604,176 612,196 Q636,242 632,280 Q628,298 614,300" fill="none" stroke="#1a1a1d" stroke-width="9" stroke-linecap="round"/>
  <path d="M256,178 L584,176 Q604,176 612,196 Q636,242 632,280 Q628,298 614,300" fill="none" stroke="#2a2a2c" stroke-width="6" stroke-linecap="round"/>
  <path d="M262,175.5 L580,173.5" fill="none" stroke="#86868e" stroke-width="1.6" stroke-linecap="round" opacity=".55"/>

  <!-- Teardrop aviator lens seen edge-on -->
  <path d="M162,158 Q162,142 180,142 L248,146 Q268,148 268,168 L262,248 Q254,326 208,334 Q170,328 162,254 Z" fill="url(#lens)" opacity=".34"/>
  <g clip-path="url(#lc)">
    <path d="M142,344 L262,118 L294,118 L174,344 Z" fill="#ffffff" opacity=".22"/>
    <path d="M194,350 L300,148 L312,148 L206,350 Z" fill="#ffffff" opacity=".14"/>
  </g>
  <path d="M164,161 Q164,145 182,145 L250,149 Q270,151 270,171 L264,251 Q256,329 210,337 Q172,331 164,257 Z" fill="none" stroke="#19191c" stroke-width="8"/>
  <path d="M162,158 Q162,142 180,142 L248,146 Q268,148 268,168 L262,248 Q254,326 208,334 Q170,328 162,254 Z" fill="none" stroke="#2a2a2c" stroke-width="5.5"/>
  <path d="M170,156 Q176,148 196,147" fill="none" stroke="#8b8b93" stroke-width="2.2" opacity=".5" stroke-linecap="round"/>

  <!-- Signature aviator brow bar above the lens -->
  <path d="M150,134 Q212,120 278,136" fill="none" stroke="#2a2a2c" stroke-width="5" stroke-linecap="round"/>
  <path d="M152,131 Q212,118 274,132" fill="none" stroke="#86868e" stroke-width="1.4" opacity=".5" stroke-linecap="round"/>

  <!-- Double-bridge stub + adjustable nose pad at the front -->
  <path d="M160,170 q-16,2 -22,12" fill="none" stroke="#2a2a2c" stroke-width="4" stroke-linecap="round"/>
  <path d="M158,236 q-14,8 -16,24" fill="none" stroke="#2a2a2c" stroke-width="3.5" stroke-linecap="round"/>
  <ellipse cx="140" cy="266" rx="5" ry="9" fill="#3a3a3e" opacity=".85"/>

  <!-- Compact wire hinge + screw -->
  <rect x="250" y="167" width="18" height="22" rx="5" fill="#222225"/>
  <circle cx="259" cy="178" r="2.6" fill="#5a5a62"/>
</svg>
