<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Vision side profile — Round frame (temple-arm view). Charcoal #2a2a2c, shared studio backdrop. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#f7f7f5"/>
      <stop offset="1" stop-color="#e3e3e0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-300%" width="200%" height="700%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9f0f5"/>
      <stop offset="1" stop-color="#c6d2db"/>
    </linearGradient>
    <clipPath id="lc"><ellipse cx="212" cy="243" rx="60" ry="82"/></clipPath>
  </defs>

  <!-- Studio sweep + ground shadow -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="396" rx="255" ry="19" fill="#17171c" opacity=".17" filter="url(#soft)"/>

  <!-- Temple arm (wire profile): depth pass, face pass, top sheen, ear hook -->
  <path d="M258,190 L588,185 Q606,185 616,202 Q637,236 643,268" fill="none" stroke="#1a1a1d" stroke-width="11" stroke-linecap="round"/>
  <path d="M258,190 L588,185 Q606,185 616,202 Q637,236 643,268" fill="none" stroke="#2a2a2c" stroke-width="7.5" stroke-linecap="round"/>
  <path d="M264,187 L584,182" fill="none" stroke="#86868e" stroke-width="1.8" stroke-linecap="round" opacity=".55"/>
  <circle cx="643" cy="268" r="5" fill="#2a2a2c"/>

  <!-- Round lens seen edge-on (foreshortened circle) -->
  <ellipse cx="212" cy="243" rx="60" ry="82" fill="url(#lens)" opacity=".34"/>
  <g clip-path="url(#lc)">
    <path d="M148,312 L262,138 L294,138 L180,312 Z" fill="#ffffff" opacity=".22"/>
    <path d="M196,320 L298,164 L310,164 L208,320 Z" fill="#ffffff" opacity=".14"/>
  </g>
  <ellipse cx="214" cy="246" rx="60" ry="82" fill="none" stroke="#19191c" stroke-width="10"/>
  <ellipse cx="212" cy="243" rx="60" ry="82" fill="none" stroke="#2a2a2c" stroke-width="7"/>
  <path d="M163,194 Q184,166 220,162" fill="none" stroke="#8b8b93" stroke-width="2.4" opacity=".5" stroke-linecap="round"/>

  <!-- Nose-pad arm at the front edge -->
  <path d="M156,232 q-15,8 -17,24" fill="none" stroke="#2a2a2c" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="137" cy="262" rx="5" ry="9" fill="#3a3a3e" opacity=".85"/>

  <!-- Hinge block + screw -->
  <rect x="248" y="177" width="22" height="25" rx="6" fill="#222225"/>
  <circle cx="259" cy="189" r="3" fill="#5a5a62"/>
</svg>
