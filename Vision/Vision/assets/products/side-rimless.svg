<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Vision side profile — Rimless frame (temple-arm view, hairline lens edge + visible mount hardware).
       Charcoal #2a2a2c, shared studio backdrop. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#f7f7f5"/>
      <stop offset="1" stop-color="#e3e3e0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-300%" width="200%" height="700%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef3f7"/>
      <stop offset="1" stop-color="#c9d4dd"/>
    </linearGradient>
    <clipPath id="lc"><rect x="154" y="172" width="114" height="146" rx="42"/></clipPath>
  </defs>

  <!-- Studio sweep + ground shadow -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="396" rx="245" ry="18" fill="#17171c" opacity=".16" filter="url(#soft)"/>

  <!-- Featherweight wire temple: depth pass, face pass, sheen -->
  <path d="M276,200 L590,194 Q607,194 615,210 Q636,242 642,272" fill="none" stroke="#1a1a1d" stroke-width="8" stroke-linecap="round"/>
  <path d="M276,200 L590,194 Q607,194 615,210 Q636,242 642,272" fill="none" stroke="#2a2a2c" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M282,197.5 L586,191.5" fill="none" stroke="#86868e" stroke-width="1.4" stroke-linecap="round" opacity=".55"/>

  <!-- Frameless lens: visible glass body with only a hairline edge -->
  <rect x="154" y="172" width="114" height="146" rx="42" fill="url(#lens)" opacity=".42"/>
  <g clip-path="url(#lc)">
    <path d="M140,326 L252,148 L286,148 L174,326 Z" fill="#ffffff" opacity=".24"/>
    <path d="M192,332 L292,176 L304,176 L204,332 Z" fill="#ffffff" opacity=".15"/>
    <!-- inner curvature glint along the lower edge -->
    <path d="M170,300 Q212,316 254,298" fill="none" stroke="#ffffff" stroke-width="3" opacity=".3"/>
  </g>
  <rect x="154" y="172" width="114" height="146" rx="42" fill="none" stroke="#2a2a2c" stroke-width="2" opacity=".6"/>
  <path d="M162,206 Q168,182 192,176" fill="none" stroke="#ffffff" stroke-width="2.4" opacity=".55" stroke-linecap="round"/>

  <!-- Rear mount lug: screws driven through the lens hold the temple -->
  <path d="M262,204 q10,-5 16,-4" fill="none" stroke="#2a2a2c" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="258" cy="204" r="3.6" fill="#2a2a2c"/>
  <circle cx="258" cy="218" r="3.6" fill="#2a2a2c"/>
  <circle cx="257" cy="203" r="1.3" fill="#8b8b93"/>
  <circle cx="257" cy="217" r="1.3" fill="#8b8b93"/>

  <!-- Front mount: bridge stub + nose-pad arm through the leading edge -->
  <path d="M162,214 q-16,0 -24,8" fill="none" stroke="#2a2a2c" stroke-width="4" stroke-linecap="round"/>
  <circle cx="165" cy="214" r="3.6" fill="#2a2a2c"/>
  <circle cx="164" cy="213" r="1.3" fill="#8b8b93"/>
  <path d="M152,246 q-13,8 -15,22" fill="none" stroke="#2a2a2c" stroke-width="3.5" stroke-linecap="round"/>
  <ellipse cx="135" cy="274" rx="5" ry="9" fill="#3a3a3e" opacity=".85"/>
</svg>
