<?xml version="1.0" encoding="UTF-8"?>
<!-- Vision · p13 Ledger Rectangle — studio front view (SPEC §8)
     frameType: Rectangle · frame #1c1c1e · lens #dce8f5 (Blue Light → fill-opacity .3) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <!-- Shared studio-sweep backdrop (identical in every product image) -->
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#f7f7f5"/>
      <stop offset="1" stop-color="#e3e3e0"/>
    </radialGradient>
    <!-- Soft blur for the ground shadow -->
    <filter id="sh" x="-40%" y="-200%" width="180%" height="500%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <!-- Left lens geometry: slim rounded rectangle (right half is a mirrored <use>) -->
    <path id="ln" d="M162 198h176q20 0 20 20v74q0 20-20 20h-176q-20 0-20-20v-74q0-20 20-20z"/>
    <clipPath id="cl"><use href="#ln"/></clipPath>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="396" rx="232" ry="17" fill="#1c1c20" opacity=".16" filter="url(#sh)"/>

  <!-- Left half: temple stub, lens fill, highlight streaks, rim (depth + face + top sheen) -->
  <g id="hf">
    <path d="M148 220L104 209" fill="none" stroke="#0d0d0f" stroke-width="9" stroke-linecap="round"/>
    <use href="#ln" fill="#dce8f5" fill-opacity=".3"/>
    <g clip-path="url(#cl)" fill="#fff" opacity=".22">
      <path d="M214 170h46L200 340h-46z"/>
      <path d="M294 170h20L254 340h-20z"/>
    </g>
    <use href="#ln" fill="none" stroke="#0d0d0f" stroke-width="14"/>
    <use href="#ln" fill="none" stroke="#1c1c1e" stroke-width="10"/>
    <path d="M170 193h160" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" opacity=".32"/>
  </g>
  <use href="#hf" transform="translate(800 0) scale(-1 1)"/>

  <!-- Bridge: darker under-stroke for depth, frame color on top -->
  <path d="M356 230C374 209 426 209 444 230" fill="none" stroke="#0d0d0f" stroke-width="13" stroke-linecap="round"/>
  <path d="M356 230C374 209 426 209 444 230" fill="none" stroke="#1c1c1e" stroke-width="10" stroke-linecap="round"/>
</svg>
