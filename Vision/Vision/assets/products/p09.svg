<?xml version="1.0" encoding="UTF-8"?>
<!-- Vision · p09 Stratos Aviator — studio front view (SPEC §8)
     frameType: Aviator · frame #c9a227 (Gold metal) · lens #33506e (Polarized → fill-opacity .82) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <!-- Shared studio-sweep backdrop (identical in every product image) -->
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#f7f7f5"/>
      <stop offset="1" stop-color="#e3e3e0"/>
    </radialGradient>
    <!-- Soft blur for the ground shadow -->
    <filter id="sh" x="-40%" y="-200%" width="180%" height="500%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <!-- Aviator teardrop lens geometry (right lens mirrors the left) -->
    <path id="eL" d="M163 202C163 163 200 148 257 148C317 148 352 167 352 202C352 243 345 282 322 314C303 341 281 352 260 352C212 352 166 298 163 202Z"/>
    <path id="eR" d="M637 202C637 163 600 148 543 148C483 148 448 167 448 202C448 243 455 282 478 314C497 341 519 352 540 352C588 352 634 298 637 202Z"/>
    <clipPath id="cL"><use href="#eL"/></clipPath>
    <clipPath id="cR"><use href="#eR"/></clipPath>
    <!-- Frame line-work: wire rims, double bridge (brow bar + lower bridge), temple stubs -->
    <g id="fr" fill="none" stroke-linecap="round">
      <use href="#eL"/>
      <use href="#eR"/>
      <path d="M346 176H454"/>
      <path d="M351 206Q400 186 449 206"/>
      <path d="M166 182C150 174 136 170 122 168"/>
      <path d="M634 182C650 174 664 170 678 168"/>
    </g>
    <!-- Diagonal glass-reflection streaks (clipped to each lens) -->
    <g id="gl" fill="#fff">
      <path d="M205 120 262 112 150 400 96 406Z" opacity=".22"/>
      <path d="M292 108 316 105 212 408 190 410Z" opacity=".15"/>
    </g>
    <!-- Top-of-rim sheen -->
    <path id="hl" d="M196 156C230 147 290 146 322 158" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity=".45"/>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="396" rx="238" ry="18" fill="#1c1c20" opacity=".16" filter="url(#sh)"/>

  <!-- Lenses: deep blue polarized tint -->
  <use href="#eL" fill="#33506e" fill-opacity=".82"/>
  <use href="#eR" fill="#33506e" fill-opacity=".82"/>
  <g clip-path="url(#cL)"><use href="#gl"/></g>
  <g clip-path="url(#cR)"><use href="#gl" x="285"/></g>

  <!-- Frame: darker under-stroke for depth, then the polished gold wire, then sheen -->
  <use href="#fr" stroke="#9c7c1b" stroke-width="11" transform="translate(0 2.5)"/>
  <use href="#fr" stroke="#c9a227" stroke-width="8"/>
  <use href="#hl"/>
  <use href="#hl" x="285"/>

  <!-- Nose-pad arms + pads -->
  <g fill="none" stroke="#9c7c1b" stroke-width="3.5" stroke-linecap="round">
    <path d="M354 222Q364 240 366 252"/>
    <path d="M446 222Q436 240 434 252"/>
  </g>
  <ellipse cx="368" cy="263" rx="6" ry="10.5" fill="#9c7c1b" transform="rotate(-12 368 263)"/>
  <ellipse cx="432" cy="263" rx="6" ry="10.5" fill="#9c7c1b" transform="rotate(12 432 263)"/>
</svg>
