<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Vision side profile — Square frame (temple-arm view). Charcoal #2a2a2c, shared studio backdrop. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#f7f7f5"/>
      <stop offset="1" stop-color="#e3e3e0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-300%" width="200%" height="700%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9f0f5"/>
      <stop offset="1" stop-color="#c6d2db"/>
    </linearGradient>
    <clipPath id="lc"><rect x="152" y="160" width="118" height="168" rx="24"/></clipPath>
  </defs>

  <!-- Studio sweep + ground shadow -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="396" rx="255" ry="19" fill="#17171c" opacity=".17" filter="url(#soft)"/>

  <!-- Temple arm (bold acetate profile): depth pass, face pass, top sheen -->
  <path d="M262,188 L584,184 Q604,184 614,202 Q636,236 642,268" fill="none" stroke="#1a1a1d" stroke-width="14" stroke-linecap="round"/>
  <path d="M262,188 L584,184 Q604,184 614,202 Q636,236 642,268" fill="none" stroke="#2a2a2c" stroke-width="10" stroke-linecap="round"/>
  <path d="M268,184 L580,180" fill="none" stroke="#86868e" stroke-width="2" stroke-linecap="round" opacity=".55"/>
  <circle cx="642" cy="268" r="6" fill="#2a2a2c"/>

  <!-- Square lens seen edge-on (bold rounded box) -->
  <rect x="152" y="160" width="118" height="168" rx="24" fill="url(#lens)" opacity=".34"/>
  <g clip-path="url(#lc)">
    <path d="M140,336 L262,132 L296,132 L174,336 Z" fill="#ffffff" opacity=".22"/>
    <path d="M192,344 L302,160 L314,160 L204,344 Z" fill="#ffffff" opacity=".14"/>
  </g>
  <rect x="154" y="163" width="118" height="168" rx="24" fill="none" stroke="#19191c" stroke-width="12"/>
  <rect x="152" y="160" width="118" height="168" rx="24" fill="none" stroke="#2a2a2c" stroke-width="9"/>
  <path d="M160,196 Q162,168 188,164" fill="none" stroke="#8b8b93" stroke-width="2.4" opacity=".5" stroke-linecap="round"/>

  <!-- Moulded acetate nose ledge at the front edge -->
  <path d="M150,238 q-12,10 -13,26" fill="none" stroke="#2a2a2c" stroke-width="6" stroke-linecap="round"/>

  <!-- Hinge block + screws (chunky acetate hinge) -->
  <rect x="248" y="172" width="26" height="30" rx="6" fill="#222225"/>
  <circle cx="261" cy="181" r="3" fill="#5a5a62"/>
  <circle cx="261" cy="194" r="3" fill="#5a5a62"/>
</svg>
