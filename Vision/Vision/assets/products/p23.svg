<?xml version="1.0" encoding="UTF-8"?>
<!-- Vision · p23 Halo Rimless — studio front view (SPEC §8)
     frameType: Rimless · frame #2e4a6b · lens #8a93a0 (Photochromic → fill-opacity .55) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <!-- Shared studio-sweep backdrop (identical in every product image) -->
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#f7f7f5"/>
      <stop offset="1" stop-color="#e3e3e0"/>
    </radialGradient>
    <!-- Soft blur for the ground shadow -->
    <filter id="sh" x="-40%" y="-200%" width="180%" height="500%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <!-- Left lens geometry: soft rounded oval, edge-polished (right half is a mirrored <use>) -->
    <path id="ln" d="M252 196C320 196 352 220 354 252C356 290 318 314 250 314C184 314 146 292 146 254C146 218 186 196 252 196Z"/>
    <clipPath id="cl"><use href="#ln"/></clipPath>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="400" cy="396" rx="232" ry="17" fill="#1c1c20" opacity=".16" filter="url(#sh)"/>

  <!-- Left half: visible metal temple, lens fill, streaks, hairline rim, mount screws, edge sheen -->
  <g id="hf">
    <path d="M150 238L102 224" fill="none" stroke="#1e344e" stroke-width="9.5" stroke-linecap="round"/>
    <path d="M150 238L102 224" fill="none" stroke="#2e4a6b" stroke-width="7" stroke-linecap="round"/>
    <use href="#ln" fill="#8a93a0" fill-opacity=".55"/>
    <g clip-path="url(#cl)" fill="#fff" opacity=".22">
      <path d="M214 170h46L200 340h-46z"/>
      <path d="M294 170h20L254 340h-20z"/>
    </g>
    <use href="#ln" fill="none" stroke="#1e344e" stroke-width="3" opacity=".55"/>
    <use href="#ln" fill="none" stroke="#2e4a6b" stroke-width="1.6"/>
    <circle cx="151" cy="238" r="4.5" fill="#1e344e"/>
    <circle cx="151" cy="238" r="2.5" fill="#2e4a6b"/>
    <circle cx="351" cy="243" r="4.5" fill="#1e344e"/>
    <circle cx="351" cy="243" r="2.5" fill="#2e4a6b"/>
    <path d="M186 210C220 196 290 196 320 210" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" opacity=".3"/>
  </g>
  <use href="#hf" transform="translate(800 0) scale(-1 1)"/>

  <!-- Bridge: clearly visible metal, darker under-stroke for depth -->
  <path d="M350 240C372 222 428 222 450 240" fill="none" stroke="#1e344e" stroke-width="10.5" stroke-linecap="round"/>
  <path d="M350 240C372 222 428 222 450 240" fill="none" stroke="#2e4a6b" stroke-width="8" stroke-linecap="round"/>
</svg>
